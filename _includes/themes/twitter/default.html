<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
    <meta name="author" content="{{ site.author.name }}">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="{{ ASSET_PATH }}/css/style.css?body=1" rel="stylesheet" type="text/css" media="all">

    <link href="{{ BASE_PATH }}{{ site.JB.atom_path }}" type="application/atom+xml" rel="alternate" title="Sitewide ATOM Feed">
    <link href="{{ BASE_PATH }}{{ site.JB.rss_path }}" type="application/rss+xml" rel="alternate" title="Sitewide RSS Feed">
    <script type="text/javascript" id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>

  <body>

    <nav class="site-nav">
      <div class="nav-inner">
        <a class="nav-link" href="{{ HOME_PATH }}">frontpage</a>
        <a class="nav-link" href="{{ HOME_PATH }}/pages/about.html">cv</a>
        <a class="nav-link" href="{{ HOME_PATH }}/pages/projects.html">projects</a>
        <a class="nav-link" href="{{ HOME_PATH }}/pages/notes.html">notes</a>
      </div>
    </nav>

    <div class="container-narrow">

      <div class="content">
        {{ content }}
      </div>
      <hr>
      <footer>
        <p><small>
          <a href="https://creativecommons.org/publicdomain/zero/1.0/"><img src="https://i.creativecommons.org/p/zero/1.0/88x31.png" alt="CC0"/></a> &nbsp;
          <a href="https://justinelfritz.github.io">J.G. Elfritz</a>
        </small></p>
      </footer>

    </div>

    {% include JB/analytics %}
  </body>
</html>
